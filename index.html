<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Advanced Safety Beacon</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: #fff; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: 0 auto; }
        .square-btn { border: 4px solid #fff; border-radius: 0px !important; font-size: 20px; font-weight: bold; cursor: pointer; width: 220px; height: 220px; margin: 40px auto; color: white; display: block; transition: background-color 0.2s, transform 0.1s; }
        .btn-start { background-color: #dc3545; box-shadow: 0 0 20px rgba(220, 53, 69, 0.5); }
        .btn-start:active { transform: scale(0.97); background-color: #bd2130; }
        .btn-stop { background-color: #007bff; box-shadow: 0 0 20px rgba(0, 123, 255, 0.5); display: none; }
        .btn-stop:active { transform: scale(0.97); background-color: #0056b3; }
        #status { margin-top: 20px; font-size: 15px; color: #ffc107; font-weight: bold; background: #222; padding: 12px; border-radius: 5px; border: 1px solid #333; }
        #video { width: 1px; height: 1px; opacity: 0.01; position: absolute; top: 0; left: 0; }
        canvas { display: none; }
        .decoy-vault { margin-top: 30px; border-top: 1px dashed #444; padding-top: 20px; display: none; }
        .file-list { text-align: left; background: #1a1a1a; padding: 10px; border-radius: 4px; font-size: 12px; font-family: monospace; max-height: 150px; overflow-y: auto; color: #ff3b30; }
        .delete-btn { background: #333; color: #fff; border: 1px solid #555; padding: 6px 12px; cursor: pointer; margin: 5px; font-size: 12px; }
        .view-db-btn { background: #222; color: #28a745; border: 1px solid #28a745; }
        .db-dump-box { background: #000; color: #00ff00; padding: 10px; text-align: left; font-size: 11px; font-family: monospace; white-space: pre-wrap; display: none; border-radius: 4px; border: 1px solid #28a745; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Secure Safety Beacon Pro</h2>
    <p>Schedule: 10 Photos/Min (6s loop) & 1 Video/Min (10s block)</p>
    <button id="startBtn" class="square-btn btn-start" onclick="startEmergencyBroadcast()">🚨 INITIATE<br>SQUARE BROADCAST</button>
    <button id="stopBtn" class="square-btn btn-stop" onclick="stopEmergencyBroadcast()">⏹️ STOP<br>BROADCAST</button>
    <div id="status">Querying mobile device camera lenses...</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="decoyVault" class="decoy-vault">
        <h3>📂 Local Device Evidence Folder (Encrypted)</h3>
        <p style="font-size:12px; color:#aaa;">Attacker Notice: Deleting local logs wipes data cache permanently.</p>
        <div id="fileList" class="file-list">No local files stored yet.</div>
        <button class="delete-btn" onclick="wipeLocalDecoyCache()">⚠️ CLEAR LOCAL FILES PERMANENTLY</button>
        <button class="delete-btn view-db-btn" onclick="inspectMobileDatabase()">🔍 VIEW RAW SQL/DB ROWS</button>
        <div id="dbDump" class="db-dump-box"></div>
    </div>
</div>
<script>
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbzhkaLbAkNRPfGVNykf_srPuNO_-mcHcJ_Lk5ekGJN42s9UtTXqbUFBECVyCAXqv6oN/exec"; 
    let activeStream = null;
    let packetRecorder = null;
    let videoChunks = [];
    let isBroadcasting = false;
    let currentLat = "Unknown", currentLon = "Unknown", gpsAccuracy = "0";
    let wakeLock = null;
    let silentAudioInterval = null;
    let audioCtx = null;
    let db = null;

    const request = indexedDB.open("LocalDecoyVault", 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore("files", { keyPath: "id" });
    };
    request.onsuccess = (e) => db = e.target.result;

    async function activateBackgroundBypass() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) { console.warn("WakeLock rejected: ", err); }
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            silentAudioInterval = setInterval(() => {
                if (!isBroadcasting) return;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            }, 1000);
        } catch(e) { console.error(e); }
    }

    async function selectWideAngleCamera() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            let selectedDeviceId = null;
            for (let device of videoDevices) {
                const label = device.label.toLowerCase();
                if (label.includes('wide') || label.includes('ultra') || label.includes('back 1') || label.includes('0.5x')) {
                    selectedDeviceId = device.deviceId;
                    break;
                }
            }
            const constraints = {
                video: selectedDeviceId ? { deviceId: { exact: selectedDeviceId } } : { facingMode: "environment" },
                audio: false 
            };
            constraints.video.width = { ideal: 640 }; 
            constraints.video.height = { ideal: 480 };
            activeStream = await navigator.mediaDevices.getUserMedia(constraints);
            const videoElement = document.getElementById('video');
            videoElement.srcObject = activeStream;
            await videoElement.play();
            return true;
        } catch (err) {
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 480 }, audio: false });
                const videoElement = document.getElementById('video');
                videoElement.srcObject = activeStream;
                await videoElement.play();
                return true;
            } catch(e) { 
                document.getElementById('status').innerText = "System Permissions Blocked!"; 
                return false;
            }
        }
    }
    async function startEmergencyBroadcast() {
        if(isBroadcasting) return;
        document.getElementById('status').innerText = "Waking background tracking matrix...";
        const cameraReady = await selectWideAngleCamera();
        if (!cameraReady) return;
        await activateBackgroundBypass();
        isBroadcasting = true;
        document.getElementById('startBtn').style.display = "none";
        document.getElementById('stopBtn').style.display = "block";
        document.getElementById('decoyVault').style.display = "block";
        document.getElementById('status').innerText = "Broadcast active. Standby mode safe.";
        document.getElementById('status').style.color = "#dc3545";
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    currentLat = pos.coords.latitude.toFixed(5);
                    currentLon = pos.coords.longitude.toFixed(5);
                    gpsAccuracy = Math.round(pos.coords.accuracy);
                }, 
                null, 
                { enableHighAccuracy: true }
            );
        }
        runBackgroundPhotoLoop();
        runBackgroundVideoLoop();
    }

    function runBackgroundPhotoLoop() {
        if (!isBroadcasting) return;
        executePhotoCapture();
        setTimeout(runBackgroundPhotoLoop, 6000); 
    }

    function runBackgroundVideoLoop() {
        if (!isBroadcasting) return;
        executeVideoIntervalBlock();
        setTimeout(runBackgroundVideoLoop, 60000); 
    }

    function stopEmergencyBroadcast() {
        isBroadcasting = false;
        clearInterval(silentAudioInterval);
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        if (packetRecorder && packetRecorder.state === "recording") packetRecorder.stop();
        if (activeStream) { activeStream.getTracks().forEach(t => t.stop()); activeStream = null; }
        document.getElementById('startBtn').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
        document.getElementById('status').innerText = "Broadcast Closed. Standby Active.";
        document.getElementById('status').style.color = "#28a745";
    }

    function executePhotoCapture() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 640;
        canvas.height = 480;
        try {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7); 
            const idx = dataUrl.indexOf(',') + 1;
            const base64Str = dataUrl.substring(idx); 
            const cleanTime = new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-');
            const payload = {
                type: "photo",
                image: base64Str,
                latitude: currentLat,
                longitude: currentLon,
                accuracy: gpsAccuracy,
                timestamp: cleanTime
            };
            transmitPacketToCloud(payload);
            saveToDecoyLocalVault(cleanTime + ".jpg", "Photo Frame (" + gpsAccuracy + "m accuracy)");
        } catch (e) { console.error(e); }
    }

    function executeVideoIntervalBlock() {
        videoChunks = [];
        let options = { mimeType: 'video/webm;codecs=vp8' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'video/mp4' }; }
        try {
            packetRecorder = new MediaRecorder(activeStream, options);
            packetRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) videoChunks.push(e.data); };
            packetRecorder.onstop = () => {
                if (videoChunks.length === 0) return;
                const videoBlob = new Blob(videoChunks, { type: options.mimeType });
                const reader = new FileReader();
                reader.readAsDataURL(videoBlob);
                reader.onloadend = () => {
                    const rawResult = reader.result;
                    const vIdx = rawResult.indexOf(',') + 1;
                    const base64Video = rawResult.substring(vIdx); 
                    const cleanTime = new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-');
                    const payload = {
                        type: "video",
                        videoData: base64Video,
                        latitude: currentLat,
                        longitude: currentLon,
                        accuracy: gpsAccuracy,
                        timestamp: cleanTime
                    };
                    transmitPacketToCloud(payload);
                    saveToDecoyLocalVault(cleanTime + ".webm", "10-Second Continuous Video Block");
                };
            };
            packetRecorder.start();
            setTimeout(() => { if (packetRecorder && packetRecorder.state === "recording") packetRecorder.stop(); }, 10000); 
        } catch (e) { console.error("Video recording setup error: ", e); }
    }

    function transmitPacketToCloud(payload) {
        fetch(googleScriptUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).catch(err => console.error("Background network error: ", err));
    }

    function saveToDecoyLocalVault(filename, details) {
        if (!db) return;
        const tx = db.transaction("files", "readwrite");
        const store = tx.objectStore("files");
        store.put({ id: filename, details: details, time: new Date().toLocaleTimeString() });
        tx.oncomplete = () => {
            const listDiv = document.getElementById("fileList");
            if (listDiv.innerText.includes("No local files")) listDiv.innerHTML = "";
            listDiv.innerHTML += "<div>📁 " + filename + " -> " + details + " [SAVED LOCAL]</div>";
        };
    }

    // Completely isolated wipe functions
    function wipeLocalDecoyCache() {
        if (!db) return;
        const tx = db.transaction("files", "readwrite");
        tx.objectStore("files").clear();
        tx.oncomplete = () => {
            document.getElementById("fileList").innerHTML = "<div style='color:#28a745;'>❌ ALL LOCAL FILES WIPED PERMANENTLY from device storage.</div>";
            alert("Local logs deleted! (Note: Secure cloud backups remain safe inside Google Drive).");
        };
    }

    function inspectMobileDatabase() {
        if (!db) { alert("Database connection not ready yet."); return; }
        const tx = db.transaction("files", "readonly");
        const store = tx.objectStore("files");
        const getAll = store.getAll();
        getAll.onsuccess = () => {
            const dumpBox = document.getElementById("dbDump");
            if (dumpBox.style.display === "block") {
                dumpBox.style.display = "none";
            } else {
                dumpBox.style.display = "block";
                var str = JSON.stringify(getAll.result, null, 2);
                dumpBox.innerText = "=== DATABASE RAW INSPECTION LOGS ===\n" + str;
            }
        };
    }
    window.onload = selectWideAngleCamera;
</script>
</body>
</html>
