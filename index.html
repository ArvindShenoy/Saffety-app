<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Advanced Safety Beacon</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: #fff; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: 0 auto; }
        
        /* Perfect Sharp Square Button Framework */
        .square-btn { 
            border: 4px solid #fff; 
            border-radius: 0px !important; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 220px; 
            height: 220px; 
            margin: 40px auto; 
            color: white;
            display: block;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-start { background-color: #dc3545; box-shadow: 0 0 20px rgba(220, 53, 69, 0.5); }
        .btn-start:active { transform: scale(0.97); background-color: #bd2130; }
        .btn-stop { background-color: #007bff; box-shadow: 0 0 20px rgba(0, 123, 255, 0.5); display: none; }
        .btn-stop:active { transform: scale(0.97); background-color: #0056b3; }
        
        #status { margin-top: 20px; font-size: 14px; color: #ffc107; font-weight: bold; background: #222; padding: 12px; border-radius: 5px; border: 1px solid #333; min-height: 40px; word-break: break-all; }
        video, canvas { display: none; } 
    </style>
</head>
<body>

<div class="container">
    <h2>Secure Safety Beacon Pro</h2>
    <p>Interval: 1 Photo / 6s (10 Total) & 1 Video Block / Min (10s continuous)</p>
    
    <button id="startBtn" class="square-btn btn-start" onclick="startEmergencyBroadcast()">🚨 INITIATE<br>SQUARE BROADCAST</button>
    <button id="stopBtn" class="square-btn btn-stop" onclick="stopEmergencyBroadcast()">⏹️ STOP<br>BROADCAST</button>
    
    <div id="status">Syncing available system camera lenses...</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    // Paste your Google Web App deployment link inside the quotation marks below:
    const googleScriptUrl = "YOUR_GOOGLE_SCRIPT_URL_HERE"; 
    
    let activeStream = null;
    let packetRecorder = null;
    let videoChunks = [];
    let photoInterval = null;
    let videoScheduleInterval = null;
    let videoDurationTimeout = null;
    let isBroadcasting = false;
    let currentLat = "Unknown", currentLon = "Unknown", gpsAccuracy = "0";

    async function selectWideAngleCamera() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(device => device.kind === 'videoinput');
            let selectedDeviceId = null;
            
            for (let device of videoDevices) {
                const label = device.label.toLowerCase();
                if (label.includes('wide') || label.includes('ultra') || label.includes('back 1') || label.includes('0.5x')) {
                    selectedDeviceId = device.deviceId;
                    break;
                }
            }
            
            const constraints = {
                video: selectedDeviceId ? { deviceId: { exact: selectedDeviceId } } : { facingMode: "environment" },
                audio: true 
            };
            constraints.video.width = { ideal: 1280 }; 
            constraints.video.height = { ideal: 720 };

            activeStream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('video').srcObject = activeStream;
            updateStatusDisplay("System Armed & Operational.", "#28a745");
        } catch (err) {
            updateStatusDisplay("Falling back to standard camera viewport.", "#ffc107");
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                document.getElementById('video').srcObject = activeStream;
            } catch(e) { updateStatusDisplay("Permissions Denied! Enable Location/Camera.", "#dc3545"); }
        }
    }

    function startEmergencyBroadcast() {
        if(isBroadcasting) return;
        isBroadcasting = true;
        
        document.getElementById('startBtn').style.display = "none";
        document.getElementById('stopBtn').style.display = "block";
        updateStatusDisplay("Broadcast Activated. Syncing loops...", "#dc3545");
        
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    currentLat = pos.coords.latitude.toFixed(5);
                    currentLon = pos.coords.longitude.toFixed(5);
                    gpsAccuracy = Math.round(pos.coords.accuracy);
                }, 
                null, 
                { enableHighAccuracy: true }
            );
        }

        // 1. Photo loop: Trigger immediately, then run every 6 seconds
        executePhotoCapture(); 
        photoInterval = setInterval(executePhotoCapture, 6000); 

        // 2. Video loop: Trigger immediately, then run every 60 seconds
        executeVideoIntervalBlock();
        videoScheduleInterval = setInterval(executeVideoIntervalBlock, 60000);
    }

    function stopEmergencyBroadcast() {
        isBroadcasting = false;
        clearInterval(photoInterval);
        clearInterval(videoScheduleInterval);
        clearTimeout(videoDurationTimeout);
        
        if (packetRecorder && packetRecorder.state === "recording") {
            packetRecorder.stop();
        }

        document.getElementById('startBtn').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
        updateStatusDisplay("Broadcast Stopped. Standby Mode.", "#28a745");
    }

    function executePhotoCapture() {
        if (!isBroadcasting) return;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = video.videoWidth || 1280;
        canvas.height = video.videoHeight || 720;

        try {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.80); 
            const base64Str = dataUrl.split(',')[1]; // Extracts raw text bytes cleanly

            const cleanTime = new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-');

            const payload = {
                type: "photo",
                image: base64Str,
                latitude: currentLat,
                longitude: currentLon,
                accuracy: gpsAccuracy,
                timestamp: cleanTime
            };

            transmitPacketToCloud(payload, "Photo [6s]");
        } catch (e) { console.error(e); }
    }

    function executeVideoIntervalBlock() {
        if (!isBroadcasting) return;
        videoChunks = [];
        
        let options = { mimeType: 'video/webm;codecs=vp8,opus' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/mp4' }; // Fallback profile layout for iOS devices
        }

        try {
            packetRecorder = new MediaRecorder(activeStream, options);
            packetRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) videoChunks.push(e.data);
            };

            packetRecorder.onstop = () => {
                if (videoChunks.length === 0) return;
                
                const videoBlob = new Blob(videoChunks, { type: options.mimeType });
                const reader = new FileReader();
                reader.readAsDataURL(videoBlob);
                reader.onloadend = () => {
                    const base64Video = reader.result.split(',')[1]; // Extracts raw text bytes cleanly
                    const cleanTime = new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-');
                    
                    const payload = {
                        type: "video",
                        videoData: base64Video,
                        latitude: currentLat,
                        longitude: currentLon,
                        accuracy: gpsAccuracy,
                        timestamp: cleanTime
                    };
                    
                    transmitPacketToCloud(payload, "Video [10s]");
                };
            };

            packetRecorder.start();
            updateStatusDisplay("Recording 10s Minute Video Block...", "#ffc107");
            
            // Automatically stop recording after 10 seconds
            videoDurationTimeout = setTimeout(() => { 
                if(packetRecorder && packetRecorder.state === "recording") packetRecorder.stop(); 
            }, 10000); 

        } catch (e) { console.error(e); }
    }

    function transmitPacketToCloud(payload, label) {
        // FIX: Content-Type set to text/plain to bypass strict browser CORS roadblocks completely!
        fetch(googleScriptUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' }, 
            body: JSON.stringify(payload)
        })
        .then(() => {
            updateStatusDisplay(`Uploaded: ${label} at ${new Date().toLocaleTimeString()}`, "#28a745");
        })
        .catch(err => {
            updateStatusDisplay("Upload Error. Check Network Link.", "#dc3545");
            console.error(err);
        });
    }

    function updateStatusDisplay(text, color) {
        const el = document.getElementById('status');
        el.innerText = text;
        el.style.color = color;
    }

    window.onload = selectWideAngleCamera;
</script>

</body>
</html>
