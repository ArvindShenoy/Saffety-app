<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Advanced Safety Beacon</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #111; color: #fff; text-align: center; padding: 15px; margin: 0; overflow-x: hidden; }
        .container { width: 100%; max-width: 400px; margin: 0 auto; padding: 0 10px; }
        .square-btn { border: 4px solid #fff; font-size: 1.25rem; font-weight: bold; cursor: pointer; width: 65vw; height: 65vw; max-width: 220px; max-height: 220px; margin: 30px auto; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: background-color 0.2s, transform 0.1s; }
        .btn-start { background-color: #dc3545; box-shadow: 0 0 20px rgba(220, 53, 69, 0.5); }
        .btn-start:active { transform: scale(0.97); background-color: #bd2130; }
        .btn-stop { background-color: #007bff; box-shadow: 0 0 20px rgba(0, 123, 255, 0.5); display: none; }
        .btn-stop:active { transform: scale(0.97); background-color: #0056b3; }
        #status { margin-top: 20px; font-size: 0.95rem; color: #ffc107; font-weight: bold; background: #222; padding: 12px; border-radius: 5px; border: 1px solid #333; word-wrap: break-word; }
        video, canvas { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>Secure Safety Beacon Pro</h2>
    <p>Schedule: 10 Photos/Min & 1 Video/Min</p>
    <button id="startBtn" class="square-btn btn-start" onclick="startEmergencyBroadcast()">🚨 INITIATE<br>BROADCAST</button>
    <button id="stopBtn" class="square-btn btn-stop" onclick="stopEmergencyBroadcast()">⏹️ STOP<br>BROADCAST</button>
    <div id="status">System Armed. Awaiting button click...</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>
<script>
    const googleScriptUrl = "https://google.com"; 
    let activeStream = null, packetRecorder = null, videoChunks = [], photoInterval = null, videoScheduleInterval = null, videoDurationTimeout = null, isBroadcasting = false;
    let currentLat = "Unknown", currentLon = "Unknown", gpsAccuracy = "0";

    async function selectWideAngleCamera() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(device => device.kind === 'videoinput');
            let selectedDeviceId = null;
            for (let device of videoDevices) {
                const label = device.label.toLowerCase();
                if (label.includes('wide') || label.includes('ultra') || label.includes('back 1') || label.includes('0.5x')) {
                    selectedDeviceId = device.deviceId; break;
                }
            }
            const constraints = { video: selectedDeviceId ? { deviceId: { exact: selectedDeviceId } } : { facingMode: "environment" }, audio: false };
            constraints.video.width = { ideal: 1280 }; constraints.video.height = { ideal: 720 };
            activeStream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('video').srcObject = activeStream; return true;
        } catch (err) {
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                document.getElementById('video').srcObject = activeStream; return true;
            } catch(e) { 
                document.getElementById('status').innerText = "Camera Access Blocked!"; return false;
            }
        }
    }

    async function startEmergencyBroadcast() {
        if(isBroadcasting) return;
        if (!await selectWideAngleCamera()) return; 
        isBroadcasting = true;
        document.getElementById('startBtn').style.display = "none";
        document.getElementById('stopBtn').style.display = "block";
        document.getElementById('status').innerText = "Broadcast active...";
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                currentLat = pos.coords.latitude.toFixed(5);
                currentLon = pos.coords.longitude.toFixed(5);
                gpsAccuracy = Math.round(pos.coords.accuracy);
            }, null, { enableHighAccuracy: true, timeout: 5000 });
        }
        executePhotoCapture(); 
        photoInterval = setInterval(executePhotoCapture, 6000); 
        executeVideoIntervalBlock();
        videoScheduleInterval = setInterval(executeVideoIntervalBlock, 60000); 
    }

    function stopEmergencyBroadcast() {
        isBroadcasting = false; clearInterval(photoInterval); clearInterval(videoScheduleInterval); clearTimeout(videoDurationTimeout);
        if (packetRecorder && packetRecorder.state === "recording") packetRecorder.stop();
        if (activeStream) activeStream.getTracks().forEach(track => track.stop());
        document.getElementById('startBtn').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
        document.getElementById('status').innerText = "System Standby.";
    }

    function executePhotoCapture() {
        if (!isBroadcasting) return;
        const video = document.getElementById('video'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth || 1280; canvas.height = video.videoHeight || 720;
        try {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.80); 
            transmitPacketToCloud({
                type: "photo", image: dataUrl.substring(dataUrl.indexOf(',') + 1),
                latitude: currentLat, longitude: currentLon, accuracy: gpsAccuracy, timestamp: new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-')
            });
        } catch (e) { console.error(e); }
    }

    function executeVideoIntervalBlock() {
        if (!isBroadcasting) return;
        videoChunks = [];
        let chosenMime = 'video/webm;codecs=vp8';
        if (!MediaRecorder.isTypeSupported(chosenMime)) chosenMime = 'video/webm';
        if (!MediaRecorder.isTypeSupported(chosenMime)) chosenMime = 'video/mp4';
        try {
            packetRecorder = new MediaRecorder(activeStream, chosenMime ? { mimeType: chosenMime } : {});
            packetRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) videoChunks.push(e.data); };
            packetRecorder.onstop = () => {
                if (videoChunks.length === 0) return;
                const actualMime = packetRecorder.mimeType || 'video/webm';
                const reader = new FileReader();
                reader.readAsDataURL(new Blob(videoChunks, { type: actualMime }));
                reader.onloadend = () => {
                    const rawResult = reader.result;
                    transmitPacketToCloud({
                        type: "video", videoData: rawResult.substring(rawResult.indexOf(',') + 1), mimeType: actualMime,
                        latitude: currentLat, longitude: currentLon, accuracy: gpsAccuracy, timestamp: new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-')
                    });
                };
            };
            packetRecorder.start();
            videoDurationTimeout = setTimeout(() => { if (packetRecorder && packetRecorder.state === "recording") packetRecorder.stop(); }, 10000);
        } catch (e) { console.error(e); }
    }

    function transmitPacketToCloud(payload) {
        fetch(googleScriptUrl, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) })
        .then(() => { document.getElementById('status').innerText = `Uploaded ${payload.type.toUpperCase()} at ${new Date().toLocaleTimeString()}`; })
        .catch(err => { document.getElementById('status').innerText = "Upload failed."; });
    }
</script>
</body>
</html>
