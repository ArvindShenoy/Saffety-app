<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS FailSafe Safety Beacon</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: #fff; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: 0 auto; }
        .square-btn { border: 4px solid #fff; border-radius: 0px !important; font-size: 20px; font-weight: bold; cursor: pointer; width: 220px; height: 220px; margin: 40px auto; color: white; display: block; }
        .btn-start { background-color: #dc3545; box-shadow: 0 0 20px rgba(220, 53, 69, 0.5); }
        .btn-stop { background-color: #007bff; box-shadow: 0 0 20px rgba(0, 123, 255, 0.5); display: none; }
        #status { margin-top: 20px; font-size: 15px; color: #ffc107; font-weight: bold; background: #222; padding: 12px; border-radius: 5px; border: 1px solid #333; }
        #video { width: 160px; height: 120px; background: #000; margin: 10px auto; display: block; border: 1px solid #333; }
        canvas { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>Failsafe Safety Beacon</h2>
    <p>Pulsing Loop Tracking Interface Enabled</p>
    
    <video id="video" autoplay loop muted playsinline webkit-playsinline></video>
    
    <button id="startBtn" class="square-btn btn-start" onclick="startEmergencyBroadcast()">🚨 INITIATE<br>BROADCAST</button>
    <button id="stopBtn" class="square-btn btn-stop" onclick="stopEmergencyBroadcast()">⏹️ STOP<br>BROADCAST</button>
    <div id="status">System Mounted & Armed. Tap Square Trigger...</div>
    <canvas id="canvas"></canvas>
</div>
<script>
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbzhkaLbAkNRPfGVNykf_srPuNO_-mcHcJ_Lk5ekGJN42s9UtTXqbUFBECVyCAXqv6oN/exec"; 
    let activeStream = null;
    let packetRecorder = null;
    let videoChunks = [];
    let photoInterval = null;
    let videoScheduleInterval = null;
    let videoDurationTimeout = null;
    let isBroadcasting = false;
    let currentLat = "Unknown", currentLon = "Unknown", gpsAccuracy = "0";

    async function initFailsafeCamera() {
        if (activeStream) return true;
        try {
            const constraints = {
                video: { facingMode: "environment" },
                audio: false
            };
            activeStream = await navigator.mediaDevices.getUserMedia(constraints);
            const videoElement = document.getElementById('video');
            videoElement.srcObject = activeStream;
            await videoElement.play();
            return true;
        } catch (err) {
            document.getElementById('status').innerText = "Hardware Error: " + err.name;
            return false;
        }
    }

    async function startEmergencyBroadcast() {
        if(isBroadcasting) return;
        document.getElementById('status').innerText = "Waking optical sensors...";
        
        const cameraReady = await initFailsafeCamera();
        if (!cameraReady) return;

        isBroadcasting = true;
        document.getElementById('startBtn').style.display = "none";
        document.getElementById('stopBtn').style.display = "block";
        document.getElementById('status').innerText = "Broadcast Active. Running data transmission...";
        document.getElementById('status').style.color = "#dc3545";

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    currentLat = pos.coords.latitude.toFixed(5);
                    currentLon = pos.coords.longitude.toFixed(5);
                    gpsAccuracy = Math.round(pos.coords.accuracy);
                }, 
                null, 
                { enableHighAccuracy: true }
            );
        }

        executePhotoCapture(); 
        photoInterval = setInterval(executePhotoCapture, 6000); 

        executeVideoIntervalBlock();
        videoScheduleInterval = setInterval(executeVideoIntervalBlock, 60000); 
    }

    function stopEmergencyBroadcast() {
        isBroadcasting = false;
        clearInterval(photoInterval);
        clearInterval(videoScheduleInterval);
        clearTimeout(videoDurationTimeout);
        if (packetRecorder && packetRecorder.state === "recording") {
            packetRecorder.stop();
        }
        if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
            activeStream = null;
        }
        document.getElementById('startBtn').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
        document.getElementById('status').innerText = "Broadcast Terminated. Standby.";
        document.getElementById('status').style.color = "#28a745";
    }

    function executePhotoCapture() {
        if (!isBroadcasting) return;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        
        try {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8); 
            const base64Str = dataUrl.substring(dataUrl.indexOf(',') + 1); 
            const cleanTime = new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-');
            const payload = {
                type: "photo",
                image: base64Str,
                latitude: currentLat,
                longitude: currentLon,
                accuracy: gpsAccuracy,
                timestamp: cleanTime
            };
            transmitPacketToCloud(payload);
            document.getElementById('status').innerText = "Uploaded: Photo Loop at " + new Date().toLocaleTimeString();
        } catch (e) { console.error(e); }
    }

    function executeVideoIntervalBlock() {
        if (!isBroadcasting) return;
        videoChunks = [];
        
        let options = { mimeType: 'video/webm;codecs=vp8' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/mp4' }; 
        }
        try {
            packetRecorder = new MediaRecorder(activeStream, options);
            packetRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) videoChunks.push(e.data);
            };
            packetRecorder.onstop = () => {
                if (videoChunks.length === 0) return;
                const videoBlob = new Blob(videoChunks, { type: options.mimeType });
                const reader = new FileReader();
                reader.readAsDataURL(videoBlob);
                reader.onloadend = () => {
                    const rawResult = reader.result;
                    const base64Video = rawResult.substring(rawResult.indexOf(',') + 1); 
                    const cleanTime = new Date().toLocaleTimeString('en-US', { hour12: false }).replace(/:/g, '-');
                    const payload = {
                        type: "video",
                        videoData: base64Video,
                        latitude: currentLat,
                        longitude: currentLon,
                        accuracy: gpsAccuracy,
                        timestamp: cleanTime
                    };
                    transmitPacketToCloud(payload);
                    document.getElementById('status').innerText = "Uploaded: Video Packet at " + new Date().toLocaleTimeString();
                };
            };
            packetRecorder.start();
            videoDurationTimeout = setTimeout(() => { 
                if(packetRecorder && packetRecorder.state === "recording") packetRecorder.stop(); 
            }, 10000); 
        } catch (e) { console.error(e); }
    }

    function transmitPacketToCloud(payload) {
        fetch(googleScriptUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).catch(err => console.error(err));
    }
</script>
</body>
</html>
